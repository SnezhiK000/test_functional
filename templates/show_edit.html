<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование студента</title>
</head>
<body>
    <h1>Редактирование студента: {{ student.name }}</h1>

    <form method="POST" action="">
        {% csrf_token %}

        <label>Имя:</label>
        <input type="text" name="name" value="{{ student.name }}" required>
        <br><br>

        <label>Пароль:</label>
        <input type="password" name="password" value="{{ student.password }}">
        <br><br>

        <label>Группа:</label>
        <select name="group">
            {% for group in groups %}
                <option value="{{ group.id }}" {% if group.id == student.group.id %}selected{% endif %}>
                    {{ group.name }}
                </option>
            {% endfor %}
        </select>
        <br><br>

        <button type="submit">Сохранить</button>
        <a href="{% url 'show_students' %}">Отмена</a>
    </form>
</body>
</html>
