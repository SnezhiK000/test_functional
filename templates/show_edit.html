<!DOCTYPE html>
<html>
<head><title>Редактировать</title></head>
<body>
    <h2>Редактировать студента</h2>
    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <label>Имя:</label>
        <input type="text" name="name" value="{{ student.name }}" required><br>
        <button type="submit">Сохранить</button>
    </form>
    <a href="{% url 'show_students' %}">Назад</a>
</body>
</html>
